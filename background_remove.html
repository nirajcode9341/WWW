<html lang="en">

    <meta charset="UTF-8">

        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";
        window.removeBackground = removeBackground;
    </script>

    <link rel="stylesheet" href="background_remover.css">
</head>

<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <a href="index.html">
            <div class="logo">Ranjit Studio Kapka</div>
        </a>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <nav>
            <ul class="nav-list" id="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="csc_service.html">CSC Services</a></li>
                <li><a href="videography.html">Studio & Videography</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN BOX -->
    <div class="box">
        <h2>Background Remover</h2>

        <div id="drop-area">
            <p>Click or Drag & Drop Image Here</p>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="btn-group">
            <button onclick="removeBg()">Remove Background</button>
            <button id="downloadBtn" onclick="downloadImage()" disabled>Download PNG</button>
        </div>

        <p id="status"></p>

        <div class="preview-wrapper">
            <div class="preview-box">
                <h3>Original</h3>
                <div id="originalPreview" class="image-preview"></div>
            </div>

            <div class="preview-box">
                <h3>Result</h3>
                <div id="resultPreview" class="image-preview checkerboard"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 Ranjit Studio Kapka. All rights reserved.</p>
    </footer>

    <script type="module">
    import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";
    window.removeBackground = removeBackground;
</script>

<script>
    let selectedFile = null;
    let outputUrl = "";

    const input = document.getElementById("imageInput");
    const dropArea = document.getElementById("drop-area");
    const originalPreview = document.getElementById("originalPreview");
    const resultPreview = document.getElementById("resultPreview");
    const statusText = document.getElementById("status");
    const downloadBtn = document.getElementById("downloadBtn");
    const mobileMenu = document.getElementById("mobile-menu");
    const navList = document.getElementById("nav-list");

    mobileMenu.addEventListener("click", () => {
        mobileMenu.classList.toggle("open");
        navList.classList.toggle("active");
    });

    dropArea.addEventListener("click", () => input.click());

    input.addEventListener("change", (e) => {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        }
    });

    dropArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropArea.style.background = "#fff7ed";
    });

    dropArea.addEventListener("dragleave", () => {
        dropArea.style.background = "transparent";
    });

    dropArea.addEventListener("drop", (e) => {
        e.preventDefault();
        dropArea.style.background = "transparent";

        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    function handleFile(file) {
        if (!file.type.startsWith("image/")) {
            alert("Please upload a valid image file.");
            return;
        }

        selectedFile = file;
        outputUrl = "";
        downloadBtn.disabled = true;
        resultPreview.innerHTML = "";
        statusText.textContent = "";

        const reader = new FileReader();
        reader.onload = function (e) {
            originalPreview.innerHTML = `<img src="${e.target.result}" alt="Original Image">`;
        };
        reader.readAsDataURL(file);
    }

    async function removeBg() {
        if (!selectedFile) {
            alert("Please select an image first.");
            return;
        }

        try {
            statusText.textContent = "Removing background... please wait.";
            resultPreview.innerHTML = `<div class="loader"></div>`;
            downloadBtn.disabled = true;

            const resizedBlob = await resizeImage(selectedFile, 1000);

            const blob = await window.removeBackground(resizedBlob);
            outputUrl = URL.createObjectURL(blob);

            resultPreview.innerHTML = `<img src="${outputUrl}" alt="Background Removed Image">`;
            statusText.textContent = "Background removed successfully.";
            downloadBtn.disabled = false;
        } catch (error) {
            console.error(error);
            statusText.textContent = "Failed to remove background. Try another image.";
            resultPreview.innerHTML = "";
        }
    }

    function downloadImage() {
        if (!outputUrl) return;

        const a = document.createElement("a");
        a.href = outputUrl;
        a.download = "background-removed.png";
        a.click();
    }

    function resizeImage(file, maxSize = 1000) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const reader = new FileReader();

            reader.onload = (e) => {
                img.src = e.target.result;
            };

            img.onload = () => {
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxSize) {
                        height *= maxSize / width;
                        width = maxSize;
                    }
                } else {
                    if (height > maxSize) {
                        width *= maxSize / height;
                        height = maxSize;
                    }
                }

                const canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);

                canvas.toBlob((blob) => {
                    if (blob) resolve(blob);
                    else reject(new Error("Resize failed"));
                }, "image/png");
            };

            img.onerror = reject;
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }
</script>
</body>

</html>
