<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Remover</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="background_remover.css">

    <script type="module">
        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";
        window.removeBackgroundLib = removeBackground;
    </script>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B1MPZCSR95"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B1MPZCSR95');
</script>

<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <a href="index.html">
            <div class="logo">Ranjit Studio Kapka</div>
        </a>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <nav>
            <ul class="nav-list" id="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="csc_service.html">CSC Services</a></li>
                <li><a href="videography.html">Studio & Videography</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN BOX -->
    <div class="box">
        <h2>Background Remover</h2>

        <div id="drop-area">
            <p>Click or Drag & Drop Image Here</p>
            <input type="file" id="imageInput" accept="image/*" hidden>
        </div>

        <div class="btn-group">
            <button onclick="removeBg()">Remove Background</button>
            <button id="downloadBtn" onclick="downloadImage()" disabled>Download PNG</button>
        </div>

        <p id="status"></p>

        <div class="preview-wrapper">
            <div class="preview-box">
                <h3>Original</h3>
                <div id="originalPreview" class="image-preview"></div>
            </div>

            <div class="preview-box">
                <h3>Result</h3>
                <div id="resultPreview" class="image-preview checkerboard"></div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 Ranjit Studio Kapka. All rights reserved.</p>
    </footer>

    <script>
        let selectedFile = null;
        let outputUrl = "";

        const input = document.getElementById("imageInput");
        const dropArea = document.getElementById("drop-area");
        const originalPreview = document.getElementById("originalPreview");
        const resultPreview = document.getElementById("resultPreview");
        const statusText = document.getElementById("status");
        const downloadBtn = document.getElementById("downloadBtn");
        const mobileMenu = document.getElementById("mobile-menu");
        const navList = document.getElementById("nav-list");

        mobileMenu.addEventListener("click", () => {
            mobileMenu.classList.toggle("open");
            navList.classList.toggle("active");
        });

        dropArea.addEventListener("click", () => input.click());

        input.addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        dropArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropArea.style.background = "#fff7ed";
        });

        dropArea.addEventListener("dragleave", () => {
            dropArea.style.background = "transparent";
        });

        dropArea.addEventListener("drop", (e) => {
            e.preventDefault();
            dropArea.style.background = "transparent";

            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith("image/")) {
                alert("Please upload a valid image file.");
                return;
            }

            selectedFile = file;
            outputUrl = "";
            downloadBtn.disabled = true;
            resultPreview.innerHTML = "";
            statusText.textContent = "";

            if (outputUrl) {
                URL.revokeObjectURL(outputUrl);
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                originalPreview.innerHTML = `<img src="${e.target.result}" alt="Original Image">`;
            };
            reader.readAsDataURL(file);
        }

        window.removeBg = async function () {
            if (!selectedFile) {
                alert("Please select an image first.");
                return;
            }

            try {
                statusText.textContent = "Removing background... first time may take longer.";
                resultPreview.innerHTML = `<div class="loader"></div>`;
                downloadBtn.disabled = true;

                console.log("Starting background removal...");
                console.log("Selected file:", selectedFile);

                const blob = await window.removeBackgroundLib(selectedFile);

                console.log("Background removal completed:", blob);

                if (!blob || blob.size === 0) {
                    throw new Error("Empty result received.");
                }

                outputUrl = URL.createObjectURL(blob);
                resultPreview.innerHTML = `<img src="${outputUrl}" alt="Background Removed Image">`;
                statusText.textContent = "Background removed successfully.";
                downloadBtn.disabled = false;

            } catch (error) {
                console.error("Background removal error:", error);
                statusText.textContent = "Failed to remove background. Open browser console to check error.";
                resultPreview.innerHTML = "";
            }
        };

        window.downloadImage = function () {
            if (!outputUrl) return;

            const a = document.createElement("a");
            a.href = outputUrl;
            a.download = "background-removed.png";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    </script>
</body>
</html>
