<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Image</title>
  <link rel="stylesheet" href="upload.css" />
</head>
<body>

  <div class="topbar">
    Ranjit Studio Admin Panel
</div>

<div class="container">
    <div class="upload-box">

        <h2>Upload Image</h2>
        <p>Add image to gallery</p>

        <input type="text" id="title" placeholder="Enter image title">
        <input type="file" id="imageFile">

        <button id="uploadBtn">Upload Image</button>
        <button id="logoutBtn" class="logout-btn">Logout</button>

        <p id="msg"></p>

    </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://kyraxmsaxfbbmfrddhdo.supabase.co",
      "sb_publishable_BQc5xbpGika-XXMBzq_Bzg_h4jFjd7d"
    );

    async function checkUser() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        window.location.href = "login.html";
      }
    }

    checkUser();

    document.getElementById("uploadBtn").addEventListener("click", async function () {
      const title = document.getElementById("title").value.trim();
      const fileInput = document.getElementById("imageFile");
      const file = fileInput.files[0];
      const msg = document.getElementById("msg");

      msg.innerText = "";
      msg.style.color = "black";

      if (!title || !file) {
        msg.innerText = "Please enter title and choose image.";
        msg.style.color = "red";
        return;
      }

      const { data: userData } = await supabaseClient.auth.getUser();
      const user = userData.user;

      if (!user) {
        msg.innerText = "User not logged in.";
        msg.style.color = "red";
        window.location.href = "login.html";
        return;
      }

      const fileName = Date.now() + "_" + file.name;

      msg.innerText = "Uploading image...";

      const { error: storageError } = await supabaseClient
        .storage
        .from("gallery")
        .upload(fileName, file);

      if (storageError) {
        msg.innerText = storageError.message;
        msg.style.color = "red";
        return;
      }

      const { data: publicUrlData } = supabaseClient
        .storage
        .from("gallery")
        .getPublicUrl(fileName);

      const imageUrl = publicUrlData.publicUrl;

      const { error: dbError } = await supabaseClient
        .from("gallery_images")
        .insert([
          {
            title: title,
            image_url: imageUrl,
            uploaded_by: user.email
          }
        ]);

      if (dbError) {
        msg.innerText = dbError.message;
        msg.style.color = "red";
        return;
      }

      msg.innerText = "Image uploaded successfully!";
      msg.style.color = "green";

      document.getElementById("title").value = "";
      fileInput.value = "";
    });

    document.getElementById("logoutBtn").addEventListener("click", async function () {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
